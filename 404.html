<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 · Tanya Samarakovskaya</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/webp" href="assets/icon.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#16161a;color:#efe9da;
    font-family:"Space Grotesk",sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:32px;text-align:center;
  }
  .wrap{max-width:520px}
  .code{font-size:clamp(96px,22vw,200px);font-weight:700;line-height:.9;letter-spacing:-.05em}
  .code em{font-family:"Bricolage Grotesque",sans-serif;font-style:italic;color:#c9f24d}
  .msg{margin:24px 0 36px;font-size:clamp(16px,2.4vw,20px);color:rgba(239,233,218,.7);line-height:1.4}
  .label{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:rgba(239,233,218,.4);margin-bottom:20px}
  a.home{
    display:inline-flex;align-items:center;gap:10px;
    background:#c9f24d;color:#16161a;text-decoration:none;
    font-weight:600;font-size:15px;padding:14px 26px;border-radius:40px;
    transition:transform .2s;
  }
  a.home:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="label">Страница не найдена</div>
    <div class="code">4<em>0</em>4</div>
    <p class="msg">Такой страницы нет или она переехала. Вернёмся на главную.</p>
    <a class="home" href="/">На главную <span>↗</span></a>
  </div>
</body>
</html>
