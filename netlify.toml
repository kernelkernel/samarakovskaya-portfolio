[build]
  publish = "."

# Редирект netlify.app → основной домен (важно для SEO)
[[redirects]]
  from = "https://samarakovskaya.netlify.app/*"
  to = "https://samarakovskaya.art/:splat"
  status = 301
  force = true

# Заголовки безопасности и кеширования
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
